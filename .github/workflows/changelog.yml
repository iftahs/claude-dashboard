name: Auto changelog

# After `version-bump.yml` bumps the patch version on a PR branch, this workflow
# uses GitHub Models (free, authenticated with the built-in GITHUB_TOKEN — no
# extra secret, no API billing) to read the PR's changes and prepend a matching
# entry to CHANGELOG.md on the same branch, so the changelog lands together with
# the version on merge.
#
# The model writes only the prose (the ### Added / ### Changed / ### Fixed
# bullets); the version header, date, and release link are added deterministically
# in code so they can't be hallucinated.
#
# Ordering & loop safety (both workflows run on the same `synchronize` events):
#   - Skip until the version is actually bumped (HEAD version != main version),
#     so we never write an entry for a version that doesn't exist yet.
#   - Skip if CHANGELOG.md already has a section for the current version. The
#     bot's own push re-triggers `synchronize`; by then the section exists → no-op.
# Runs only for same-repo branches (the token can't push to forks).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  models: read

concurrency:
  group: changelog-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decide whether an entry is needed
        id: check
        run: |
          git fetch origin main
          git show origin/main:package.json > "$RUNNER_TEMP/main-package.json"
          MAIN_VERSION=$(node -p "require('$RUNNER_TEMP/main-package.json').version")
          HEAD_VERSION=$(node -p "require('./package.json').version")

          # Version not bumped yet — version-bump.yml's push will re-trigger us.
          if [ "$HEAD_VERSION" = "$MAIN_VERSION" ]; then
            echo "Version not bumped yet ($HEAD_VERSION); skipping changelog."
            echo "needs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Entry already written (our own push re-triggers this run).
          if [ -f CHANGELOG.md ] && grep -q "## \[$HEAD_VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG already has an entry for $HEAD_VERSION; skipping."
            echo "needs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs=true" >> "$GITHUB_OUTPUT"
          echo "version=$HEAD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Gather PR changes
        if: steps.check.outputs.needs == 'true'
        run: |
          {
            echo "Commits in this release:"
            echo
            git log origin/main..HEAD --no-merges --pretty=format:'- %s%n%b'
            echo
            echo
            echo "Files changed:"
            git diff --stat origin/main...HEAD
          } > "$RUNNER_TEMP/changes.txt"
          echo "----- model input -----"
          cat "$RUNNER_TEMP/changes.txt"

      - name: Draft the entry with GitHub Models
        if: steps.check.outputs.needs == 'true'
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          max-completion-tokens: 500
          prompt-file: ${{ runner.temp }}/changes.txt
          system-prompt: |
            You write changelog entries in the Keep a Changelog style.

            You are given the commits and a diff stat for a single release. Output
            ONLY the changelog body: one or more of the sections "### Added",
            "### Changed", "### Fixed", each followed by "- " bullet lines.

            Rules:
            - Map feat -> Added, fix -> Fixed, everything else -> Changed.
            - Omit any section that has no items.
            - Bullets are concise, present-tense, and user-facing — describe the
              effect on the user, not the commit. Do not just echo commit subjects.
            - Ignore "chore: bump version" commits entirely.
            - Do NOT include a version header, date, links, preamble, or code fences.
            - If there are no user-facing changes, output exactly:
              "### Changed\n- Internal maintenance and tooling."

      - name: Insert into CHANGELOG and push
        if: steps.check.outputs.needs == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
          RESPONSE_FILE: ${{ steps.ai.outputs['response-file'] }}
        run: |
          node - "$VERSION" "$RESPONSE_FILE" <<'NODE'
          const fs = require('fs');
          const [version, respFile] = process.argv.slice(2);

          let body = fs.readFileSync(respFile, 'utf8').trim();
          // Strip accidental code fences.
          body = body.replace(/^```[a-z]*\s*/i, '').replace(/\s*```$/i, '').trim();
          if (!body) {
            console.log('Empty model response; leaving CHANGELOG untouched.');
            process.exit(0);
          }

          const date = new Date().toISOString().slice(0, 10);
          const file = 'CHANGELOG.md';
          let md = fs.readFileSync(file, 'utf8');
          const section = `## [${version}] - ${date}\n\n${body}\n\n`;

          // Insert above the most recent existing version section.
          const idx = md.search(/^## \[/m);
          md = idx === -1 ? md.trimEnd() + '\n\n' + section : md.slice(0, idx) + section + md.slice(idx);

          // Add a release link reference, mirroring the existing ones.
          const ref = md.match(/^\[(\d+\.\d+\.\d+)\]:\s*(\S+)\/releases\/tag\/v\1\s*$/m);
          if (ref) {
            const line = `[${version}]: ${ref[2]}/releases/tag/v${version}\n`;
            const first = md.search(/^\[\d+\.\d+\.\d+\]:/m);
            md = md.slice(0, first) + line + md.slice(first);
          }

          fs.writeFileSync(file, md);
          console.log(`Inserted changelog entry for v${version}.`);
          NODE

          if git diff --quiet -- CHANGELOG.md; then
            echo "No CHANGELOG change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for v$VERSION"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
