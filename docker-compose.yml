services:
  dashboard:
    build:
      context: .
      args:
        # Set VITE_DISABLE_ANALYTICS=1 in your .env to opt out of anonymous
        # product analytics at build time (see .env.example). Empty = analytics on.
        VITE_DISABLE_ANALYTICS: "${VITE_DISABLE_ANALYTICS:-}"
        # Set WITH_CLAUDE_CLI=1 in your .env to bundle the Claude Code CLI so AI
        # Insights can run `claude -p` in the container (uses your mounted token,
        # avoids the rate-limited OAuth Messages path). Adds ~size to the image.
        WITH_CLAUDE_CLI: "${WITH_CLAUDE_CLI:-}"
    image: claude-dashboard
    container_name: claude-dashboard
    ports:
      - "8787:8787"
    volumes:
      # Mount your real ~/.claude into the container, read-only.
      # Set CLAUDE_DIR_HOST in a .env file (see .env.example).
      - "${CLAUDE_DIR_HOST}:/data/.claude:ro"
      # Claude Cowork (desktop "local agent mode") data, read-only. Optional:
      # if COWORK_DIR_HOST is unset it falls back to .claude, which contains no
      # nested .claude/projects transcripts at the scanned depth → zero cowork
      # events (harmless) and the container still boots. See .env.example.
      - "${COWORK_DIR_HOST:-${CLAUDE_DIR_HOST}}:/data/cowork:ro"
    environment:
      - CLAUDE_DIR=/data/.claude
      - COWORK_DIR=/data/cowork
      - SERVER_PORT=8787
      - APP_RUNTIME=docker
      # AI Insights (chat + per-section buttons). In Docker there's no `claude`
      # CLI, so set ANTHROPIC_API_KEY in .env for a dedicated, un-throttled
      # backend. Unset → falls back to the Claude.ai OAuth token (works, but is
      # rate-limited → may 429). AI_MODEL is optional (default claude-opus-4-8).
      # To route through a corporate LLM proxy (LiteLLM / gateway) instead, set
      # ANTHROPIC_BASE_URL + ANTHROPIC_AUTH_TOKEN in .env (the token is sent as a
      # bearer Authorization header). Host shell vars are NOT auto-passed, so they
      # must be listed here. Set AI_MODEL if the proxy doesn't serve claude-opus-4-8.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - AI_MODEL=${AI_MODEL:-}
      # OPTIONAL — when on a LiteLLM proxy, the dashboard shows the gateway's ACTUAL
      # billed cost beside the estimate. By default it reuses ANTHROPIC_BASE_URL +
      # ANTHROPIC_AUTH_TOKEN; set these only if the spend-read key/url differs.
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # Day buckets follow the container clock — pin it to your local timezone
      # (override TZ in .env if you are not in Asia/Jerusalem).
      - TZ=${TZ:-Asia/Jerusalem}
    # Always available: restarts on crash and on machine reboot
    # (as long as Docker Desktop is set to start at login).
    restart: unless-stopped
