services:
  dashboard:
    build: .
    image: claude-dashboard
    container_name: claude-dashboard
    ports:
      - "8787:8787"
    volumes:
      # Mount your real ~/.claude into the container, read-only.
      # Set CLAUDE_DIR_HOST in a .env file (see .env.example).
      - "${CLAUDE_DIR_HOST}:/data/.claude:ro"
    environment:
      - CLAUDE_DIR=/data/.claude
      - SERVER_PORT=8787
      # Day buckets follow the container clock — pin it to your local timezone
      # (override TZ in .env if you are not in Asia/Jerusalem).
      - TZ=${TZ:-Asia/Jerusalem}
    # Always available: restarts on crash and on machine reboot
    # (as long as Docker Desktop is set to start at login).
    restart: unless-stopped
